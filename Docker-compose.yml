version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cmms_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: cmms_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db
  api:
    build:
      context: .  
      dockerfile: backend/Dockerfile  
    container_name: cmms_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db  
    volumes:
      - .:/app  
volumes:
  postgres_data: